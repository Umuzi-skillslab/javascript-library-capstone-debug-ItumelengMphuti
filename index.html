<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A digital library management system for a browsing, borrowing and managing books and members."
    />
    <meta name="keywords" content="author, books, isbn" />
    <meta name="author" content="Itumeleng Mphuti" />
    <meta name="theme-color" content="#ffffff" />
    <title>Library Management System</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Digital Library System</h1>
        <nav aria-label="Main navigation">
          <div role="tablist" aria-label="Main navigation">
            <button
              id="catalogue-tab"
              type="button"
              role="tab"
              aria-selected="true"
              aria-controls="catalogue-section"
              tabindex="0"
            >
              Catalogue
            </button>
            <button
              id="members-tab"
              type="button"
              role="tab"
              aria-selected="false"
              aria-controls="member-section"
              tabindex="-1"
            >
              Members
            </button>
            <button
              id="statistics-tab"
              type="button"
              role="tab"
              aria-selected="false"
              aria-controls="statistics-section"
              tabindex="-1"
            >
              Statistics
            </button>
          </div>
        </nav>
      </header>

      <main id="main-content">
        <section
          id="catalogue-section"
          role="tabpanel"
          aria-labelledby="catalogue-tab"
        >
          <div class="controls">
            <label for="search">Search books</label>
            <input
              type="text"
              id="search"
              placeholder="Search books..."
              autocomplete="off"
            />

            <label for="filter-category">Filter by category</label>
            <select id="filter-category" autocomplete="off">
              <option value="all">All Categories</option>
              <option value="fiction">Fiction</option>
              <option value="non-fiction">Non-Fiction</option>
              <option value="reference">Reference</option>
            </select>
          </div>
          <div id="book-details" aria-live="polite" aria-label="Book details">
            <!-- Selected book details -->
            <h3>Book Details</h3>
            <p>Select a book to see more information.</p>
          </div>
          <!-- aria-live so screen readers announce updates to the book list -->
          <div
            id="catalogue-list"
            class="book-grid"
            aria-live="polite"
            aria-label="Book catalogue"
          >
            <!-- Books rendered here -->
          </div>
          <button id="toggle-books">View All Books</button>

          <!-- aria-live so screen readers announce when a book is selected -->
        </section>

        <section id="borrow-section">
          <h2>Borrow a Book</h2>

          <form id="borrow-form" novalidate>
            <div
              id="borrow-feedback"
              class="hidden"
              role="alert"
              aria-live="assertive"
            ></div>

            <label for="member-id">Member ID</label>
            <input
              type="text"
              id="member-id"
              placeholder="Member ID"
              autocomplete="off"
              required
            />

            <label for="isbn">ISBN</label>
            <input
              type="text"
              id="isbn"
              placeholder="ISBN"
              autocomplete="off"
              required
            />

            <button type="submit">Borrow Book</button>
          </form>
        </section>

        <section id="return-section">
          <h2>Return a Book</h2>

          <form id="return-form" novalidate>
            <div id="return-feedback" role="alert" aria-live="assertive"></div>

            <label for="return-member-id">Member ID</label>
            <input
              type="text"
              id="return-member-id"
              placeholder="Member ID"
              required
            />

            <label for="return-isbn">ISBN</label>
            <input type="text" id="return-isbn" placeholder="ISBN" required />

            <button type="submit">Return Book</button>
          </form>
        </section>

        <section
          id="member-section"
          role="tabpanel"
          aria-labelledby="members-tab"
          class="hidden"
        >
          <h2>Member Management</h2>
          <div id="member-form">
            <!-- Member form rendered here -->
          </div>
          <div id="member-list" aria-live="polite" aria-label="Members list">
            <!-- Members list -->
          </div>
        </section>

        <section
          id="statistics-section"
          role="tabpanel"
          aria-labelledby="statistics-tab"
          class="hidden"
        >
          <h2>Library Statistics</h2>
          <div class="stats-grid">
            <div class="stat-card">
              <h3>Total Books</h3>
              <p id="total-books">0</p>
            </div>
            <div class="stat-card">
              <h3>Total Members</h3>
              <p id="total-members">0</p>
            </div>
            <div class="stat-card">
              <h3>Books Borrowed</h3>
              <p id="books-borrowed">0</p>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="../src/ui.js"></script>
  </body>
</html>
